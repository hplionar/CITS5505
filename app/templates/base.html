<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}CSHub{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
  >

  <!-- Base CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">

  {% block styles %}{% endblock %}
</head>

<body>
  <div class="app-shell">

    <!-- Top Navigation -->
    <header class="topbar">
      <div class="topbar-left">
        <a href="/" class="brand-link">CSHub</a>

        <button
          class="sidebar-toggle"
          id="sidebarToggle"
          type="button"
          aria-label="Toggle navigation menu"
          aria-controls="appSidebar"
          aria-expanded="true"
        >
          <i class="bi bi-list" aria-hidden="true"></i>
        </button>
      </div>

      <form class="search-bar" action="#" method="GET" role="search">
        <i class="bi bi-search search-icon" aria-hidden="true"></i>

        <input
          type="search"
          name="q"
          placeholder="Search CSHub"
          aria-label="Search CSHub"
        >
      </form>

      <div class="topbar-actions">
        <button class="icon-button" type="button" aria-label="Live chat">
          <i class="bi bi-chat-dots" aria-hidden="true"></i>
        </button>

        <button class="icon-button" type="button" aria-label="Notifications">
          <i class="bi bi-bell" aria-hidden="true"></i>
        </button>

        <div class="profile-dropdown">
          <button
            class="profile-button"
            id="profileToggle"
            type="button"
            aria-label="Open profile menu"
            aria-haspopup="true"
            aria-expanded="false"
          >
            <span class="profile-avatar">H</span>
          </button>

          <div class="profile-menu" id="profileMenu" hidden>
            <a href="#" class="profile-menu-item">
              <i class="bi bi-person-circle" aria-hidden="true"></i>
              <span>View Profile</span>
            </a>

            <a href="#" class="profile-menu-item">
              <i class="bi bi-trophy" aria-hidden="true"></i>
              <span>Achievements</span>
            </a>

            <a href="#" class="profile-menu-item">
              <i class="bi bi-gear" aria-hidden="true"></i>
              <span>Settings</span>
            </a>

            <div class="profile-menu-divider"></div>

            <form action="{{ url_for('main.logout') }}" method="POST" class="profile-menu-form">
              <button type="submit" class="profile-menu-item profile-menu-button">
                <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                <span>Logout</span>
              </button>
            </form>
          </div>
        </div>
      </div>
    </header>

    <!-- Main App Layout -->
    <div class="app-layout">

      <!-- Sidebar -->
      <aside class="sidebar" id="appSidebar">
        <nav class="sidebar-nav" aria-label="Main navigation">

          <a href="/" class="sidebar-link {% if request.path == '/' %}is-active{% endif %}">
            <i class="bi bi-house-door sidebar-icon" aria-hidden="true"></i>
            <span class="sidebar-label">Home</span>
          </a>

          <a href="{{ url_for('main.announcements') }}" class="sidebar-link {% if request.path.startswith('/announcements') %}is-active{% endif %}">
            <i class="bi bi-newspaper sidebar-icon" aria-hidden="true"></i>
            <span class="sidebar-label">Announcements</span>
          </a>

          <a href="#" class="sidebar-link">
            <i class="bi bi-chat-square-text sidebar-icon" aria-hidden="true"></i>
            <span class="sidebar-label">Forum</span>
          </a>

          <a href="/studybuddy" class="sidebar-link {% if request.path.startswith('/studybuddy') %}is-active{% endif %}">
            <i class="bi bi-journal-code sidebar-icon" aria-hidden="true"></i>
            <span class="sidebar-label">Study Buddy</span>
          </a>

          <div class="sidebar-divider"></div>

          <p class="sidebar-section-title">Resources</p>

          <a href="#" class="sidebar-link">
            <i class="bi bi-question-circle sidebar-icon" aria-hidden="true"></i>
            <span class="sidebar-label">Help</span>
          </a>

          <a href="#" class="sidebar-link">
            <i class="bi bi-shield-check sidebar-icon" aria-hidden="true"></i>
            <span class="sidebar-label">CSHub Rules</span>
          </a>

        </nav>
      </aside>

      <!-- Page Content -->
      <main class="main-content">
        {% block content %}{% endblock %}
      </main>

    </div>
  </div>

  <script src="{{ url_for('static', filename='js/base.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
