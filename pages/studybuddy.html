<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyHub - Study Buddy</title>
  <link rel="stylesheet" href="../css/studybuddy.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero__content">
        <p class="hero__eyebrow">StudyHub</p>
        <h1 class="hero__title">Study Buddy</h1>
        <p class="hero__subtitle">
          Find study partners or small groups based on unit, topic, time, and preferred study mode.
        </p>
      </div>

      <div class="hero__actions">
        <button class="btn btn--dark" id="openCreateModal" type="button">+ Create Session</button>
      </div>
    </header>

    <main class="main-content">
      <section class="toolbar-card">
        <div class="toolbar-row">
          <div class="mode-tabs" id="modeTabs">
            <button class="tab-btn active" data-mode="all" type="button">All Sessions</button>
            <button class="tab-btn" data-mode="in-person" type="button">In Person</button>
            <button class="tab-btn" data-mode="online" type="button">Online</button>
            <button class="tab-btn" data-mode="hybrid" type="button">Hybrid</button>
          </div>

          <div class="toolbar-actions">
            <select id="sortSelect" class="select-control">
              <option value="soonest">Sort: Soonest</option>
              <option value="popular">Sort: Most Filled</option>
              <option value="newest">Sort: Newest</option>
            </select>
          </div>
        </div>

        <div class="filter-grid">
          <div class="field">
            <label for="searchInput">Search</label>
            <input
              id="searchInput"
              type="text"
              placeholder="Search by unit, topic, or keyword"
            />
          </div>

          <div class="field">
            <label for="dayFilter">Day</label>
            <select id="dayFilter">
              <option value="all">All days</option>
              <option value="Mon">Monday</option>
              <option value="Tue">Tuesday</option>
              <option value="Wed">Wednesday</option>
              <option value="Thu">Thursday</option>
              <option value="Fri">Friday</option>
              <option value="Sat">Saturday</option>
              <option value="Sun">Sunday</option>
            </select>
          </div>

          <div class="field">
            <label for="viewFilter">Quick View</label>
            <select id="viewFilter">
              <option value="all">All sessions</option>
              <option value="joined">Joined by me</option>
              <option value="saved">Saved by me</option>
              <option value="hosted">Created by me</option>
            </select>
          </div>
        </div>
      </section>

      <section class="summary-row">
        <div class="summary-pill" id="resultCount">0 sessions</div>
        <div class="summary-pill" id="summaryText">Loading sessions...</div>
      </section>

      <section class="session-grid" id="sessionGrid" aria-live="polite"></section>
    </main>
  </div>

  <div class="modal-backdrop" id="modalBackdrop"></div>

  <aside class="side-panel" id="createPanel" aria-hidden="true">
    <div class="side-panel__header">
      <div>
        <p class="panel-label">New session</p>
        <h2>Create Study Session</h2>
      </div>
      <button class="icon-btn" id="closeCreateModal" aria-label="Close" type="button">×</button>
    </div>

    <form id="sessionForm" class="session-form" novalidate>
      <div class="field">
        <label for="unitCode">Unit / Category</label>
        <input id="unitCode" name="unitCode" type="text" placeholder="e.g. CITS4401 • Requirements & Design" />
        <small class="error-text" data-error-for="unitCode"></small>
      </div>

      <div class="field">
        <label for="topic">Session Title</label>
        <input id="topic" name="topic" type="text" placeholder="e.g. Exam Revision Group" />
        <small class="error-text" data-error-for="topic"></small>
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea
          id="description"
          name="description"
          placeholder="Briefly describe what this session is for."
        ></textarea>
        <small class="error-text" data-error-for="description"></small>
      </div>

      <div class="two-col">
        <div class="field">
          <label for="hostName">Host Name</label>
          <input id="hostName" name="hostName" type="text" placeholder="Your name" />
          <small class="error-text" data-error-for="hostName"></small>
        </div>

        <div class="field">
          <label for="capacity">Max Participants</label>
          <input id="capacity" name="capacity" type="number" min="2" max="20" placeholder="5" />
          <small class="error-text" data-error-for="capacity"></small>
        </div>
      </div>

      <div class="two-col">
        <div class="field">
          <label for="day">Day</label>
          <select id="day" name="day">
            <option value="">Select day</option>
            <option value="Mon">Monday</option>
            <option value="Tue">Tuesday</option>
            <option value="Wed">Wednesday</option>
            <option value="Thu">Thursday</option>
            <option value="Fri">Friday</option>
            <option value="Sat">Saturday</option>
            <option value="Sun">Sunday</option>
          </select>
          <small class="error-text" data-error-for="day"></small>
        </div>

        <div class="field">
          <label for="time">Time</label>
          <input id="time" name="time" type="text" placeholder="e.g. Tue 4:00 PM" />
          <small class="error-text" data-error-for="time"></small>
        </div>
      </div>

      <div class="field">
        <label for="mode">Mode</label>
        <select id="mode" name="mode">
          <option value="">Select mode</option>
          <option value="in-person">In person</option>
          <option value="online">Online</option>
          <option value="hybrid">Hybrid</option>
        </select>
        <small class="error-text" data-error-for="mode"></small>
      </div>

      <div class="panel-actions">
        <button type="button" class="btn btn--light" id="resetFormBtn">Reset</button>
        <button type="submit" class="btn btn--dark">Create Session</button>
      </div>
    </form>
  </aside>

  <div class="toast-stack" id="toastStack"></div>

  <script src="../js/studybuddy.js"></script>
</body>
</html>
